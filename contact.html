<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact Us - EXPX Store</title>
<link rel="icon" href="images/20250406_215203.png" type="image/png">
<style>
  body { background:#121212; color:white; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; }
  nav { background: rgba(10,10,10,0.7); padding:14px 20px; position:sticky; top:0; display:flex; justify-content:center; gap:15px; font-weight:600; flex-wrap:wrap; }
  nav a { color:white; text-decoration:none; border-radius:22px; padding:6px 18px; transition:0.3s; }
  nav a:hover, nav a.active { background:#3a8ee6; color:black; }

  .container {
    width:90%;
    max-width:600px;
    margin:60px auto;
    padding:25px 20px;
    background: rgba(30,30,30,0.6);
    border-radius:12px;
    box-shadow:0 0 30px #3a8ee6bb;
  }
  h1 { color:#3a8ee6; text-align:center; margin-bottom:20px; font-size:1.8rem; }
  form { display:flex; flex-direction:column; gap:15px; }
  label { font-weight:600; }
  input, textarea { background:#222; border:1.5px solid #3a8ee6; border-radius:10px; padding:10px 15px; color:white; font-size:1rem; resize:vertical; }
  input:focus, textarea:focus { outline:none; border-color:#63a9f9; }
  button { padding:12px 0; font-size:1rem; font-weight:700; background:#3a8ee6; border:none; border-radius:30px; color:black; cursor:pointer; transition:0.3s; }
  button:hover{ background:#63a9f9; color:black; }
  .buy-button{ display:inline-block; padding:12px 28px; background:#3a8ee6; color:black; text-decoration:none; border-radius:30px; font-weight:700; transition:all 0.3s ease; text-align:center; }
  .buy-button:hover{ background:#63a9f9; color:black; }

  @media (max-width:480px){
    h1 { font-size:1.5rem; }
    input, textarea { font-size:0.9rem; padding:8px 12px; }
    button, .buy-button { font-size:0.9rem; padding:10px 20px; }
    nav a { padding:5px 12px; font-size:0.9rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="contact.html" class="active">Contact Us</a>
</nav>

<div class="container">
  <h1>Contact Us</h1>
  <form id="contact-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your name..." required />
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Your email..." required />
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>

<div class="container">
  <h1>Contact Us Using Discord</h1>
  <a class="buy-button" href="https://discord.gg/YNWKvym85V" target="_blank">Our Discord Server</a>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  const name=document.querySelector('#name').value.trim();
  const email=document.querySelector('#email').value.trim();
  const message=document.querySelector('#message').value.trim();
  if(!name||!email||!message){ alert("Please fill in all fields."); return; }
  const webhookUrl="https://discord.com/api/webhooks/1483187318369292491/jpRcW7q3wXyFziQilmEQkckpNPWxvPTUccMBTzqPHXF7CuVJPsXl4kPPvB0sShOL1-7L";
  fetch(webhookUrl,{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({content:`📬 **New Contact Submission**\n\n👤 **Name:** ${name}\n📧 **Email:** ${email}\n💬 **Message:**\n${message}`})})
  .then(res=>{ if(res.ok){ alert("✅ Message sent successfully!"); document.getElementById('contact-form').reset(); } else alert("❌ Failed to send message."); })
  .catch(err=>{ console.error(err); alert("⚠️ Error sending message."); });
});
</script>

</body>
</html>
